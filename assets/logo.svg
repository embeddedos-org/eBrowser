<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Browser window frame -->
  <rect x="80" y="100" width="352" height="300" rx="16" ry="16" fill="#ffffff" opacity="0.15"/>
  <rect x="80" y="100" width="352" height="44" rx="16" ry="16" fill="#ffffff" opacity="0.25"/>

  <!-- Browser dots -->
  <circle cx="108" cy="122" r="8" fill="#ef4444" opacity="0.9"/>
  <circle cx="132" cy="122" r="8" fill="#f59e0b" opacity="0.9"/>
  <circle cx="156" cy="122" r="8" fill="#22c55e" opacity="0.9"/>

  <!-- URL bar -->
  <rect x="178" y="110" width="236" height="24" rx="12" ry="12" fill="#ffffff" opacity="0.3"/>

  <!-- Globe icon (represents web browsing) -->
  <circle cx="256" cy="272" r="80" fill="none" stroke="url(#globe)" stroke-width="6" opacity="0.9"/>
  <!-- Globe horizontal lines -->
  <ellipse cx="256" cy="272" rx="80" ry="30" fill="none" stroke="url(#globe)" stroke-width="3" opacity="0.7"/>
  <line x1="176" y1="272" x2="336" y2="272" stroke="url(#globe)" stroke-width="3" opacity="0.7"/>
  <!-- Globe vertical arc -->
  <ellipse cx="256" cy="272" rx="35" ry="80" fill="none" stroke="url(#globe)" stroke-width="3" opacity="0.7"/>

  <!-- Circuit traces (embedded/IoT theme) -->
  <!-- Bottom left circuit -->
  <line x1="100" y1="420" x2="160" y2="420" stroke="url(#circuit)" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="420" x2="160" y2="380" stroke="url(#circuit)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="160" cy="374" r="6" fill="url(#circuit)"/>
  <line x1="100" y1="440" x2="140" y2="440" stroke="url(#circuit)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="94" cy="420" r="5" fill="url(#circuit)"/>
  <circle cx="94" cy="440" r="4" fill="url(#circuit)"/>

  <!-- Bottom right circuit -->
  <line x1="412" y1="420" x2="352" y2="420" stroke="url(#circuit)" stroke-width="4" stroke-linecap="round"/>
  <line x1="352" y1="420" x2="352" y2="380" stroke="url(#circuit)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="352" cy="374" r="6" fill="url(#circuit)"/>
  <line x1="412" y1="440" x2="372" y2="440" stroke="url(#circuit)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="418" cy="420" r="5" fill="url(#circuit)"/>
  <circle cx="418" cy="440" r="4" fill="url(#circuit)"/>

  <!-- Top circuit accents -->
  <line x1="100" y1="76" x2="150" y2="76" stroke="url(#circuit)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <circle cx="156" cy="76" r="4" fill="url(#circuit)" opacity="0.6"/>
  <line x1="362" y1="76" x2="412" y2="76" stroke="url(#circuit)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <circle cx="356" cy="76" r="4" fill="url(#circuit)" opacity="0.6"/>

  <!-- "e" lettermark inside globe -->
  <text x="256" y="292" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.95">e</text>

  <!-- Bottom text -->
  <text x="256" y="476" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="4" opacity="0.9">BOWSER</text>
</svg>
