name: Weekly Comprehensive Tests
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
jobs:
  full-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev libcurl4-openssl-dev valgrind
      - name: Build with sanitizers
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_SANITIZERS=ON
          ninja
      - name: Test
        run: cd build && ctest --output-on-failure -j$(nproc)
      - name: Memory check
        run: cd build && ctest -T memcheck --output-on-failure || true
