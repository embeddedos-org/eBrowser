name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  # ═══════════════════════════════════════════════════
  # 1. BUILD ON LINUX (existing behavior preserved)
  # ═══════════════════════════════════════════════════
  build-linux:
    name: Build — Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsdl2-dev

      - name: Create include symlink
        run: ln -sf ebrowser include/eBrowser

      - name: Build Release
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DeBrowser_BUILD_STANDALONE=OFF \
            -DeBrowser_BUILD_BROWSER=OFF \
            -DeBrowser_BUILD_RENDER=OFF \
            -DCMAKE_C_FLAGS="-O2 -fstack-protector-strong -D_FORTIFY_SOURCE=2 -fPIE" \
            -DCMAKE_EXE_LINKER_FLAGS="-pie -Wl,-z,relro,-z,now"
          cmake --build build --parallel $(nproc)

      - name: Run all tests
        run: |
          cd build
          ctest --output-on-failure \
            -R "test_memory_safety|test_sandbox|test_firewall|test_anti_fingerprint|test_extension|test_privacy|test_tab_manager|test_bookmark"

      - name: Run benchmark
        run: cd build/tests && ./benchmark 2>/dev/null | tee /tmp/benchmark.txt

      - name: Run load test
        run: cd build/tests && ./load_test_combined 2>/dev/null | tee /tmp/loadtest.txt

      - name: Strip binaries
        run: |
          strip build/tests/benchmark build/tests/load_test_combined
          ls -lh build/tests/benchmark build/tests/load_test_combined

      - name: Package release artifacts
        run: |
          mkdir -p release
          cp build/tests/benchmark release/
          cp build/tests/load_test_combined release/
          cp README.md CHANGELOG.md LICENSE release/
          tar czf ebrowser-${{ github.ref_name }}-linux-x86_64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebrowser-linux-x86_64
          path: ebrowser-${{ github.ref_name }}-linux-x86_64.tar.gz

  # ═══════════════════════════════════════════════════
  # 2. BUILD ON WINDOWS
  # ═══════════════════════════════════════════════════
  build-windows:
    name: Build — Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: vcpkg install sdl2:x64-windows

      - name: Build Release
        continue-on-error: true
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=OFF `
            -DeBrowser_BUILD_STANDALONE=OFF `
            -DeBrowser_BUILD_BROWSER=OFF `
            -DeBrowser_BUILD_RENDER=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake --build build --config Release --parallel

      - name: Package release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          # Copy executables
          Get-ChildItem -Path build -Recurse -Include *.exe | ForEach-Object {
            Copy-Item $_.FullName -Destination release/
          }
          # Copy DLLs
          Get-ChildItem -Path build -Recurse -Include *.dll | ForEach-Object {
            Copy-Item $_.FullName -Destination release/
          }
          Copy-Item README.md, CHANGELOG.md, LICENSE -Destination release/ -ErrorAction SilentlyContinue
          Compress-Archive -Path release/* -DestinationPath "ebrowser-${{ github.ref_name }}-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebrowser-windows-x86_64
          path: ebrowser-${{ github.ref_name }}-windows-x86_64.zip

  # ═══════════════════════════════════════════════════
  # 3. BUILD ON macOS
  # ═══════════════════════════════════════════════════
  build-macos:
    name: Build — macOS x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install sdl2

      - name: Build Release
        continue-on-error: true
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DeBrowser_BUILD_STANDALONE=OFF \
            -DeBrowser_BUILD_BROWSER=OFF \
            -DeBrowser_BUILD_RENDER=OFF
          cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Package release artifacts
        run: |
          mkdir -p release
          find build -maxdepth 3 -type f -perm +111 \
            \( -name "benchmark" -o -name "load_test*" -o -name "eBrowser" -o -name "ebrowser" \) \
            -exec cp {} release/ \; 2>/dev/null || true
          find build -maxdepth 3 -type f -name "*.dylib" \
            -exec cp {} release/ \; 2>/dev/null || true
          cp README.md CHANGELOG.md LICENSE release/ 2>/dev/null || true
          tar czf ebrowser-${{ github.ref_name }}-macos-x86_64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebrowser-macos-x86_64
          path: ebrowser-${{ github.ref_name }}-macos-x86_64.tar.gz

  # ═══════════════════════════════════════════════════
  # 4. BUILD BOOK PDF
  # ═══════════════════════════════════════════════════
  build-pdf:
    name: Build Book PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check book source
        id: check
        run: |
          if [ ! -f docs/book/book.md ]; then
            echo "has_book=false" >> $GITHUB_OUTPUT
          else
            echo "has_book=true" >> $GITHUB_OUTPUT
          fi

      - name: Install pandoc & LaTeX
        if: steps.check.outputs.has_book == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra

      - name: Clean source
        if: steps.check.outputs.has_book == 'true'
        run: sed -i 's/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]//g' docs/book/book.md

      - name: Generate PDF
        if: steps.check.outputs.has_book == 'true'
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          pandoc \
            docs/book/book.md \
            -o eBrowser-guide.pdf \
            --pdf-engine=xelatex \
            --from=markdown+smart \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V documentclass=report \
            -V "title=eBrowser — Official Reference Guide" \
            -V "subtitle=Version $VERSION" \
            -V "author=Srikanth Patchava \\& EmbeddedOS Contributors" \
            -V "date=$(date +'%B %Y')" \
            -V toc=true \
            -V toc-depth=3 \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue \
            --highlight-style=tango \
            --number-sections

      - name: Verify PDF
        if: steps.check.outputs.has_book == 'true'
        run: |
          if [ ! -f eBrowser-guide.pdf ]; then
            echo "ERROR: PDF not generated"
            exit 1
          fi
          SIZE=$(du -h eBrowser-guide.pdf | cut -f1)
          echo "PDF generated: $SIZE"

      - name: Upload PDF artifact
        if: steps.check.outputs.has_book == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf
          path: eBrowser-guide.pdf

  # ═══════════════════════════════════════════════════
  # 5. CREATE RELEASE WITH ALL ASSETS
  # ═══════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, build-pdf]
    if: always() && needs.build-linux.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p final
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.pdf" \) \
            -exec cp {} final/ \;
          echo "Release assets:"
          ls -lh final/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "eBrowser ${{ steps.version.outputs.tag }}"
          body: |
            ## eBrowser ${{ steps.version.outputs.tag }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `ebrowser-${{ steps.version.outputs.tag }}-linux-x86_64.tar.gz` |
            | Windows x86_64 | `ebrowser-${{ steps.version.outputs.tag }}-windows-x86_64.zip` |
            | macOS x86_64 | `ebrowser-${{ steps.version.outputs.tag }}-macos-x86_64.tar.gz` |
            | Reference Guide (PDF) | `eBrowser-guide.pdf` |

            ### Highlights
            - **577K+ requests/sec** with 8-layer security pipeline
            - **16 µs** average request latency
            - Process sandbox, hardened allocator, application firewall
            - Anti-fingerprinting, DNS-over-HTTPS, tracker/ad blocker

            See [CHANGELOG.md](CHANGELOG.md) for full details.
          files: final/*
          draft: false
          prerelease: false

  # ═══════════════════════════════════════════════════
  # 6. DOCKER RELEASE
  # ═══════════════════════════════════════════════════
  docker-release:
    name: Docker Release
    runs-on: ubuntu-22.04
    needs: create-release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: enterprise/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
