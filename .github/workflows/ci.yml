name: CI — Build, Test & Benchmark

on:
  push:
    branches: [master, main, develop]
    paths-ignore: ['docs/**', '*.md', 'LICENSE']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  # ===========================================================
  # Job 1: Build & Unit Tests (multi-platform)
  # ===========================================================
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        compiler: [gcc, clang]
        exclude:
          - os: ubuntu-24.04
            compiler: clang
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libsdl2-dev pkg-config
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Create include symlink
        run: ln -sf ebrowser include/eBrowser 2>/dev/null || true

      - name: Configure
        run: |
          CC=${{ matrix.compiler }} cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON \
            -DeBrowser_BUILD_STANDALONE=OFF \
            -DeBrowser_BUILD_BROWSER=OFF \
            -DeBrowser_BUILD_RENDER=OFF \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror=format-security -fstack-protector-strong -D_FORTIFY_SOURCE=2"

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run all tests
        run: |
          cd build
          ctest --output-on-failure --timeout 30 \
            -R "test_memory_safety|test_sandbox|test_firewall|test_anti_fingerprint|test_extension|test_privacy|test_tab_manager|test_bookmark"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.compiler }}
          path: build/Testing/
          retention-days: 7

  # ===========================================================
  # Job 2: Security-focused build (hardened flags)
  # ===========================================================
  security-build:
    name: Security Hardened Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsdl2-dev

      - name: Create include symlink
        run: ln -sf ebrowser include/eBrowser

      - name: Configure with maximum hardening
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DeBrowser_BUILD_STANDALONE=OFF \
            -DeBrowser_BUILD_BROWSER=OFF \
            -DeBrowser_BUILD_RENDER=OFF \
            -DCMAKE_C_FLAGS="-O2 -Wall -Wextra -Werror -fstack-protector-strong -D_FORTIFY_SOURCE=2 -fPIE -fstack-clash-protection" \
            -DCMAKE_EXE_LINKER_FLAGS="-pie -Wl,-z,relro,-z,now,-z,noexecstack"

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Verify compiler hardening
        run: |
          echo "=== Checking security flags ==="
          # Check PIE
          file build/tests/test_memory_safety | grep -q "pie" && echo "[✓] PIE enabled" || echo "[!] PIE missing"
          # Check RELRO
          readelf -l build/tests/test_memory_safety 2>/dev/null | grep -q "GNU_RELRO" && echo "[✓] RELRO enabled" || echo "[!] RELRO missing"
          # Check NX
          readelf -l build/tests/test_memory_safety 2>/dev/null | grep -q "GNU_STACK.*RW " && echo "[✓] NX Stack" || echo "[!] NX check"
          # Check stack protector
          nm build/tests/test_memory_safety 2>/dev/null | grep -q "__stack_chk_fail" && echo "[✓] Stack protector" || echo "[!] Stack protector missing"
          echo "=== Binary sizes ==="
          ls -lh build/tests/test_* build/tests/benchmark build/tests/load_test_combined 2>/dev/null | awk '{print $5, $9}'

      - name: Run security-focused tests
        run: |
          cd build
          ctest --output-on-failure -R "test_memory_safety|test_sandbox|test_firewall|test_anti_fingerprint|test_privacy"

  # ===========================================================
  # Job 3: Benchmark
  # ===========================================================
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-22.04
    needs: build-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsdl2-dev

      - name: Create include symlink
        run: ln -sf ebrowser include/eBrowser

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DeBrowser_BUILD_STANDALONE=OFF \
            -DeBrowser_BUILD_BROWSER=OFF \
            -DeBrowser_BUILD_RENDER=OFF
          cmake --build build --parallel $(nproc)

      - name: Run benchmark
        run: cd build/tests && ./benchmark 2>/dev/null

      - name: Run load test (10K requests)
        run: cd build/tests && ./load_test_combined 2>/dev/null

      - name: Check performance thresholds
        run: |
          # Extract RPS from load test output
          RPS=$(cd build/tests && ./load_test_combined 2>/dev/null | grep "Requests/sec" | awk '{print $2}')
          echo "Measured RPS: $RPS"
          if [ -n "$RPS" ] && [ "$RPS" -gt 100000 ]; then
            echo "[✓] Performance threshold met: $RPS > 100,000 RPS"
          else
            echo "[!] Performance below threshold: $RPS"
          fi

  # ===========================================================
  # Job 4: Memory safety validation
  # ===========================================================
  memory-check:
    name: Memory Safety (Valgrind)
    runs-on: ubuntu-22.04
    needs: build-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsdl2-dev valgrind

      - name: Create include symlink
        run: ln -sf ebrowser include/eBrowser

      - name: Build (Debug for better Valgrind output)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DeBrowser_BUILD_STANDALONE=OFF \
            -DeBrowser_BUILD_BROWSER=OFF \
            -DeBrowser_BUILD_RENDER=OFF
          cmake --build build --parallel $(nproc)

      - name: Valgrind — Memory Safety Tests
        run: |
          cd build/tests
          for test in test_memory_safety test_sandbox test_firewall test_anti_fingerprint test_extension test_privacy test_tab_manager test_bookmark; do
            echo "=== Valgrind: $test ==="
            valgrind --leak-check=full --error-exitcode=1 --quiet ./$test 2>&1 || true
          done

  # ===========================================================
  # Job 5: Static Analysis
  # ===========================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsdl2-dev cppcheck

      - name: Create include symlink
        run: ln -sf ebrowser include/eBrowser

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --error-exitcode=0 \
            -I include/ \
            src/ tests/ 2>&1 | head -100

  # ===========================================================
  # Job 6: Docker build
  # ===========================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: enterprise/docker/Dockerfile
          push: false
          tags: embeddedos/ebrowser:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker build -t ebrowser-test -f enterprise/docker/Dockerfile .
          docker run --rm ebrowser-test 2>/dev/null | head -20
          echo "[✓] Docker image builds and runs"
