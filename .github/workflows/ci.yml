name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libssl-dev
      - name: Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
