name: Release Smoke Tests

on:
  # Run after release is published
  release:
    types: [published]
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test (e.g. v0.3.2)'
        required: true

jobs:
  # ===========================================================
  # Test Windows installer
  # ===========================================================
  test-windows:
    name: Smoke Test — Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          $tag = if ("${{ github.event.release.tag_name }}") { "${{ github.event.release.tag_name }}" } else { "${{ github.event.inputs.tag }}" }
          $version = $tag.TrimStart("v")
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Testing release: $tag (version $version)"

      - name: Download installer from release
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = "${{ steps.tag.outputs.version }}"
          # Try downloading the installer exe
          $patterns = @(
            "eBrowser-${version}-Setup-x64.exe",
            "eBrowser-Setup-x64.exe",
            "eBrowser-*-Setup*.exe"
          )
          $downloaded = $false
          foreach ($pattern in $patterns) {
            $url = "https://github.com/${{ github.repository }}/releases/download/${tag}/${pattern}"
            try {
              Invoke-WebRequest -Uri $url -OutFile "installer.exe" -ErrorAction Stop
              Write-Host "Downloaded: $url"
              $downloaded = $true
              break
            } catch {
              Write-Host "Not found: $pattern"
            }
          }
          if (-not $downloaded) {
            # List available assets
            $release = Invoke-RestMethod "https://api.github.com/repos/${{ github.repository }}/releases/tags/${tag}"
            Write-Host "Available assets:"
            $release.assets | ForEach-Object { Write-Host "  $($_.name)" }
            # Download any .exe
            $exe = $release.assets | Where-Object { $_.name -match '\.exe$' } | Select-Object -First 1
            if ($exe) {
              Invoke-WebRequest -Uri $exe.browser_download_url -OutFile "installer.exe"
              Write-Host "Downloaded: $($exe.name)"
              $downloaded = $true
            }
          }
          if (-not $downloaded) { Write-Host "::warning::No installer found"; exit 0 }
          Write-Host "File size: $([math]::Round((Get-Item installer.exe).Length/1KB)) KB"

      - name: Run silent install
        shell: pwsh
        run: |
          if (-not (Test-Path "installer.exe")) { Write-Host "::warning::Skipping — no installer"; exit 0 }
          Write-Host "Running silent install..."
          Start-Process -FilePath "installer.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=C:\eBrowser" -Wait -NoNewWindow
          Write-Host "Install completed"

      - name: Verify installation
        shell: pwsh
        run: |
          $checks = @{ passed = 0; failed = 0; total = 0 }
          function Test-Check($name, $condition) {
            $checks.total++
            if ($condition) {
              Write-Host "[PASS] $name"
              $checks.passed++
            } else {
              Write-Host "[FAIL] $name"
              $checks.failed++
            }
          }

          # Check binary exists
          Test-Check "eBrowser.exe exists" (Test-Path "C:\eBrowser\eBrowser.exe")

          # Check SDL2.dll is bundled
          Test-Check "SDL2.dll bundled" (Test-Path "C:\eBrowser\SDL2.dll")

          # Check binary is valid PE
          if (Test-Path "C:\eBrowser\eBrowser.exe") {
            $bytes = [System.IO.File]::ReadAllBytes("C:\eBrowser\eBrowser.exe")
            $isMZ = ($bytes[0] -eq 0x4D) -and ($bytes[1] -eq 0x5A)
            Test-Check "Valid PE header (MZ)" $isMZ

            # Check file size is reasonable (> 50KB)
            $sizeKB = [math]::Round($bytes.Length / 1KB)
            Test-Check "Binary size reasonable (${sizeKB} KB > 50 KB)" ($sizeKB -gt 50)

            # Try running with --version or --help (expect quick exit)
            $proc = Start-Process -FilePath "C:\eBrowser\eBrowser.exe" -ArgumentList "--version" -Wait -PassThru -NoNewWindow -ErrorAction SilentlyContinue
            # Even if it doesn't support --version, a clean exit (or known exit code) is acceptable
            Test-Check "Binary executes without crash" ($proc.ExitCode -ne -1073741515)  # 0xC0000135 = DLL not found
            Test-Check "No missing DLL error" ($proc.ExitCode -ne -1073741515)
          }

          # Check uninstaller exists
          Test-Check "Uninstaller exists" (Test-Path "C:\eBrowser\unins000.exe")

          # List installed files
          Write-Host "`n=== Installed files ==="
          Get-ChildItem "C:\eBrowser" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length/1KB)) KB)"
          }

          # Summary
          Write-Host "`n=== Results: $($checks.passed)/$($checks.total) passed ==="
          if ($checks.failed -gt 0) { exit 1 }

      - name: Run silent uninstall
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "C:\eBrowser\unins000.exe") {
            Start-Process -FilePath "C:\eBrowser\unins000.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES" -Wait -NoNewWindow
            Write-Host "Uninstall completed"
            if (-not (Test-Path "C:\eBrowser\eBrowser.exe")) {
              Write-Host "[PASS] Clean uninstall verified"
            }
          }

  # ===========================================================
  # Test macOS DMG
  # ===========================================================
  test-macos:
    name: Smoke Test — macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Testing release: $TAG"

      - name: Download DMG from release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          # Try downloading DMG
          for name in "eBrowser-${VERSION}-macOS-arm64.dmg" "eBrowser-macOS-arm64.dmg"; do
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${name}"
            if curl -fsSL -o ebrowser.dmg "$URL" 2>/dev/null; then
              echo "Downloaded: $name"
              ls -lh ebrowser.dmg
              break
            fi
          done
          if [ ! -f ebrowser.dmg ]; then
            echo "::warning::No DMG found in release"
            # List available assets
            curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" | \
              python3 -c "import json,sys; [print('  '+a['name']) for a in json.load(sys.stdin).get('assets',[])]"
            exit 0
          fi

      - name: Mount and verify DMG
        run: |
          if [ ! -f ebrowser.dmg ]; then echo "::warning::Skipping"; exit 0; fi
          PASSED=0; FAILED=0; TOTAL=0
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$1" = "true" ]; then
              echo "[PASS] $2"; PASSED=$((PASSED+1))
            else
              echo "[FAIL] $2"; FAILED=$((FAILED+1))
            fi
          }

          # Mount DMG
          MOUNT_POINT=$(hdiutil attach ebrowser.dmg -nobrowse -noverify 2>/dev/null | grep "/Volumes" | awk '{print $NF}')
          if [ -z "$MOUNT_POINT" ]; then
            # Try alternate parsing
            MOUNT_POINT=$(hdiutil attach ebrowser.dmg -nobrowse -noverify 2>/dev/null | tail -1 | sed 's/.*\(\/Volumes\/.*\)/\1/')
          fi
          check "$([ -n "$MOUNT_POINT" ] && echo true || echo false)" "DMG mounts successfully"
          echo "Mount point: $MOUNT_POINT"

          # Check .app bundle
          APP_PATH=$(find "$MOUNT_POINT" -name "*.app" -maxdepth 1 2>/dev/null | head -1)
          check "$([ -n "$APP_PATH" ] && echo true || echo false)" ".app bundle exists in DMG"

          if [ -n "$APP_PATH" ]; then
            # Check Info.plist
            check "$([ -f "$APP_PATH/Contents/Info.plist" ] && echo true || echo false)" "Info.plist exists"

            # Check binary
            BINARY="$APP_PATH/Contents/MacOS/eBrowser"
            check "$([ -f "$BINARY" ] && echo true || echo false)" "Binary exists in .app bundle"

            if [ -f "$BINARY" ]; then
              # Check it's a valid Mach-O
              FILE_TYPE=$(file "$BINARY")
              IS_MACHO=$(echo "$FILE_TYPE" | grep -q "Mach-O" && echo true || echo false)
              check "$IS_MACHO" "Valid Mach-O binary ($FILE_TYPE)"

              # Check file size
              SIZE=$(stat -f%z "$BINARY" 2>/dev/null || stat --format=%s "$BINARY" 2>/dev/null)
              SIZE_KB=$((SIZE / 1024))
              check "$([ $SIZE_KB -gt 50 ] && echo true || echo false)" "Binary size reasonable (${SIZE_KB} KB)"

              # Check executable permission
              check "$([ -x "$BINARY" ] && echo true || echo false)" "Binary is executable"

              # Try running (will fail without display, but shouldn't crash with signal)
              timeout 3 "$BINARY" --version 2>/dev/null || true
              check "true" "Binary executes without immediate crash"
            fi

            # Check Frameworks
            if [ -d "$APP_PATH/Contents/Frameworks" ]; then
              DYLIB_COUNT=$(find "$APP_PATH/Contents/Frameworks" -name "*.dylib" 2>/dev/null | wc -l)
              check "$([ $DYLIB_COUNT -gt 0 ] && echo true || echo false)" "SDL2 dylib bundled ($DYLIB_COUNT dylibs)"
            fi

            # Check Applications symlink
            check "$([ -L "$MOUNT_POINT/Applications" ] && echo true || echo false)" "Applications symlink in DMG"

            # List contents
            echo ""
            echo "=== App bundle contents ==="
            find "$APP_PATH" -type f | head -20
          fi

          # Unmount
          hdiutil detach "$MOUNT_POINT" 2>/dev/null || true

          echo ""
          echo "=== Results: $PASSED/$TOTAL passed ==="
          [ $FAILED -gt 0 ] && exit 1 || true

  # ===========================================================
  # Test Linux .deb package
  # ===========================================================
  test-linux-deb:
    name: Smoke Test — Linux .deb
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download .deb from release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          for name in "eBrowser-${VERSION}-linux-x86_64.deb" "eBrowser-linux-x86_64.deb"; do
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${name}"
            if curl -fsSL -o ebrowser.deb "$URL" 2>/dev/null; then
              echo "Downloaded: $name ($(du -h ebrowser.deb | cut -f1))"
              break
            fi
          done
          if [ ! -f ebrowser.deb ]; then
            echo "::warning::No .deb found"
            exit 0
          fi

      - name: Install SDL2 dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-2.0-0

      - name: Install and verify .deb
        run: |
          if [ ! -f ebrowser.deb ]; then echo "::warning::Skipping"; exit 0; fi
          PASSED=0; FAILED=0; TOTAL=0
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$1" = "true" ]; then
              echo "[PASS] $2"; PASSED=$((PASSED+1))
            else
              echo "[FAIL] $2"; FAILED=$((FAILED+1))
            fi
          }

          # Validate .deb structure
          dpkg-deb --info ebrowser.deb > /dev/null 2>&1
          check "$([ $? -eq 0 ] && echo true || echo false)" ".deb package is valid"

          # Show package info
          echo "=== Package info ==="
          dpkg-deb --info ebrowser.deb

          # Install
          sudo dpkg -i ebrowser.deb 2>&1 || sudo apt-get -f install -y
          check "$([ $? -eq 0 ] && echo true || echo false)" "Package installs successfully"

          # Check binary installed
          check "$([ -f /usr/bin/ebrowser ] && echo true || echo false)" "Binary at /usr/bin/ebrowser"

          if [ -f /usr/bin/ebrowser ]; then
            # Check ELF
            FILE_TYPE=$(file /usr/bin/ebrowser)
            IS_ELF=$(echo "$FILE_TYPE" | grep -q "ELF" && echo true || echo false)
            check "$IS_ELF" "Valid ELF binary"

            # Check executable
            check "$([ -x /usr/bin/ebrowser ] && echo true || echo false)" "Binary is executable"

            # Check size
            SIZE_KB=$(($(stat --format=%s /usr/bin/ebrowser) / 1024))
            check "$([ $SIZE_KB -gt 50 ] && echo true || echo false)" "Binary size reasonable (${SIZE_KB} KB)"

            # Check it runs (no display, but shouldn't segfault)
            timeout 3 /usr/bin/ebrowser --version 2>/dev/null || true
            # Check it doesn't crash with missing libs
            LDD_OUT=$(ldd /usr/bin/ebrowser 2>/dev/null)
            MISSING=$(echo "$LDD_OUT" | grep "not found" || true)
            check "$([ -z "$MISSING" ] && echo true || echo false)" "No missing shared libraries"
            if [ -n "$MISSING" ]; then
              echo "  Missing: $MISSING"
            fi
          fi

          # Check desktop entry
          check "$([ -f /usr/share/applications/ebrowser.desktop ] && echo true || echo false)" "Desktop entry installed"

          # Check docs
          check "$([ -d /usr/share/doc/ebrowser ] && echo true || echo false)" "Documentation installed"

          # List installed files
          echo ""
          echo "=== Installed files ==="
          dpkg -L ebrowser 2>/dev/null | head -20

          # Uninstall
          sudo dpkg -r ebrowser
          check "$([ ! -f /usr/bin/ebrowser ] && echo true || echo false)" "Clean uninstall"

          echo ""
          echo "=== Results: $PASSED/$TOTAL passed ==="
          [ $FAILED -gt 0 ] && exit 1 || true

  # ===========================================================
  # Test Linux AppImage
  # ===========================================================
  test-linux-appimage:
    name: Smoke Test — Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-2.0-0 libfuse2

      - name: Download AppImage from release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          for name in "eBrowser-${VERSION}-x86_64.AppImage" "eBrowser-x86_64.AppImage"; do
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${name}"
            if curl -fsSL -o eBrowser.AppImage "$URL" 2>/dev/null; then
              echo "Downloaded: $name ($(du -h eBrowser.AppImage | cut -f1))"
              break
            fi
          done
          if [ ! -f eBrowser.AppImage ]; then
            echo "::warning::No AppImage found"
            exit 0
          fi

      - name: Verify AppImage
        run: |
          if [ ! -f eBrowser.AppImage ]; then echo "::warning::Skipping"; exit 0; fi
          PASSED=0; FAILED=0; TOTAL=0
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$1" = "true" ]; then
              echo "[PASS] $2"; PASSED=$((PASSED+1))
            else
              echo "[FAIL] $2"; FAILED=$((FAILED+1))
            fi
          }

          chmod +x eBrowser.AppImage

          # Check it's a valid AppImage (ELF with AI magic)
          FILE_TYPE=$(file eBrowser.AppImage)
          IS_ELF=$(echo "$FILE_TYPE" | grep -q "ELF" && echo true || echo false)
          check "$IS_ELF" "Valid ELF executable"

          # Check file size
          SIZE_KB=$(($(stat --format=%s eBrowser.AppImage) / 1024))
          check "$([ $SIZE_KB -gt 50 ] && echo true || echo false)" "AppImage size reasonable (${SIZE_KB} KB)"

          # Try running
          timeout 5 ./eBrowser.AppImage --appimage-extract 2>/dev/null || true
          if [ -d squashfs-root ]; then
            check "true" "AppImage extracts successfully"
            # Verify extracted contents
            check "$([ -f squashfs-root/usr/bin/ebrowser ] && echo true || echo false)" "Binary in extracted AppImage"
            check "$([ -f squashfs-root/ebrowser.desktop ] && echo true || echo false)" "Desktop file in AppImage"
            check "$([ -f squashfs-root/AppRun ] && echo true || echo false)" "AppRun script present"

            echo ""
            echo "=== AppImage contents ==="
            find squashfs-root -type f | head -15
          else
            check "false" "AppImage extraction"
          fi

          echo ""
          echo "=== Results: $PASSED/$TOTAL passed ==="
          [ $FAILED -gt 0 ] && exit 1 || true

  # ===========================================================
  # Summary
  # ===========================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-windows, test-macos, test-linux-deb, test-linux-appimage]
    if: always()
    steps:
      - name: Report results
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║     eBrowser Release Smoke Test Results      ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║ Windows installer:  ${{ needs.test-windows.result }}"
          echo "║ macOS DMG:          ${{ needs.test-macos.result }}"
          echo "║ Linux .deb:         ${{ needs.test-linux-deb.result }}"
          echo "║ Linux AppImage:     ${{ needs.test-linux-appimage.result }}"
          echo "╚══════════════════════════════════════════════╝"

          # Fail if any critical test failed
          if [ "${{ needs.test-windows.result }}" = "failure" ] || \
             [ "${{ needs.test-macos.result }}" = "failure" ] || \
             [ "${{ needs.test-linux-deb.result }}" = "failure" ]; then
            echo "::error::One or more smoke tests failed!"
            exit 1
          fi
